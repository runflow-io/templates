name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the build needs only to read the checkout. No write scopes,
# so a compromised step or a malicious fork-PR build can't push, comment, or
# touch other repo state with the GITHUB_TOKEN.
permissions:
  contents: read

# Cancel superseded runs on the same ref so spammy PRs can't pile up runners.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to full commit SHAs (not @v6 tags) so a tag re-point on
      # the action's repo can't silently change what runs here. Dependabot
      # (github-actions ecosystem) keeps these SHAs current.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install hub dependencies
        run: npm ci

      - name: Syntax-check orchestrator scripts
        run: |
          for f in build.mjs dev.mjs build-node-functions.mjs dev-node-functions.mjs; do
            node --check "$f"
          done

      # No TypeScript in the repo yet — when a project adds a tsconfig.json,
      # this step type-checks it. Until then it's a no-op that never fails.
      - name: Type-check (if any tsconfig present)
        run: |
          shopt -s globstar nullglob
          # nullglob drops unmatched globs, but a literal path stays even when
          # absent — so filter the candidates down to files that actually exist.
          present=()
          for cfg in tsconfig.json projects/**/tsconfig.json; do
            [ -f "$cfg" ] && present+=("$cfg")
          done
          if [ ${#present[@]} -eq 0 ]; then
            echo "No tsconfig.json found — skipping type-check."
          else
            for cfg in "${present[@]}"; do
              echo "Type-checking $cfg"
              npx --yes --package=typescript tsc --noEmit -p "$cfg"
            done
          fi

      - name: Build all templates
        run: npm run build
