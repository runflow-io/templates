version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Hub dependencies (esbuild) + every template's package.json.
  - package-ecosystem: npm
    directories:
      - "/"
      - "/projects/*"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    open-pull-requests-limit: 10
